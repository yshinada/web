<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Memo</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="memo-panel" aria-labelledby="app-title">
        <header class="panel-header">
          <p class="kicker">Private</p>
          <h1 id="app-title">Memo</h1>
        </header>

        <form class="password-form" id="password-form">
          <label for="password">Password</label>
          <div class="password-row">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="password"
              required
            >
            <button type="submit">Open</button>
          </div>
          <p class="message" id="message" aria-live="polite"></p>
        </form>

        <section class="editor" id="editor" hidden>
          <label for="memo">Memo</label>
          <textarea id="memo" spellcheck="true" placeholder="ここにメモを書く"></textarea>
          <div class="actions">
            <button id="save-button" type="button">Save</button>
            <button id="lock-button" type="button" class="secondary">Lock</button>
          </div>
          <p class="status" id="status" aria-live="polite"></p>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
